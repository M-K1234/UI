<script src="../js/jquery-1.11.3.min.js"></script>
<script src="../js/popper.min.js"></script>

<script>
  const keycloakBase = "http://localhost:8080";
  const realm = "airport-system";
  const API_BASE_URL = "http://localhost:5000";
  let allBookings = [];
let allPayments = [];

  function getAccessToken() {
    return localStorage.getItem("access_token");
  }

  function getUserInfo() {
    const rawUserInfo = localStorage.getItem("user_info");
    if (!rawUserInfo) {
      window.location.href = "login.html";
      return null;
    }

    try {
      return JSON.parse(rawUserInfo);
    } catch {
      localStorage.removeItem("user_info");
      window.location.href = "login.html";
      return null;
    }
  }

  function getUserIdFromToken(token) {
    const payload = JSON.parse(atob(token.split(".")[1]));
    return payload.sub;
  }

  function renderUserInfo(user) {
    const displayName =
      user.name || user.preferred_username || user.given_name || user.email || "User";

    const email = user.email || "No email found";

    document.getElementById("navbarUserName").innerText = displayName;
    document.getElementById("dropdownUserName").innerText = displayName;
    document.getElementById("dropdownUserEmail").innerText = email;

    document.getElementById("welcomeText").innerText =
      `Welcome ${displayName}. View and manage your upcoming flight bookings.`;
  }

  async function fetchJson(url, token) {
    const response = await fetch(url, {
      method: "GET",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      }
    });

    if (!response.ok) {
      console.error(`Failed request: ${url}`);
      console.error(await response.text());
      return [];
    }

    return await response.json();
  }

  async function loadDashboardData() {
    const token = getAccessToken();

    if (!token) {
      window.location.href = "login.html";
      return;
    }

    const userId = getUserIdFromToken(token);

    const bookings = await fetchJson(
      `${API_BASE_URL}/api/Booking/user/${userId}`,
      token
    );

    const payments = await fetchJson(
      `${API_BASE_URL}/api/payment/user/${userId}`,
      token
    );

    renderSummary(bookings, payments);
    allBookings = bookings;
allPayments = payments;
    renderBookings(bookings, payments);
  }

  function renderSummary(bookings, payments) {
    const summaryNumbers = document.querySelectorAll(".summary-card h3");

    const activeBookings = bookings.length;

    const pendingPayments = payments.filter(p =>
      String(p.status).toUpperCase() === "PENDING"
    ).length;

    // const notifications = 0;

    summaryNumbers[0].innerText = activeBookings;
    summaryNumbers[1].innerText = pendingPayments;
    // summaryNumbers[2].innerText = notifications;

    // const notificationCount = document.querySelector(".notification-count");
    // if (notificationCount) {
    //   notificationCount.innerText = notifications;
    //   notificationCount.style.display = notifications > 0 ? "inline-block" : "none";
    // }
  }

  function getPaymentForBooking(booking, payments) {
    const bookingId = booking.id || booking.bookingId;

    return payments.find(p =>
      String(p.booking_id) === String(bookingId)
    );
  }

  function renderBookings(bookings, payments) {
    const container = document.getElementById("bookingsContainer");
    container.innerHTML = "";

    if (!bookings.length) {
      container.innerHTML = `
        <div class="summary-card">
          <p>No bookings found.</p>
        </div>
      `;
      return;
    }

    bookings.forEach(booking => {
      const payment = getPaymentForBooking(booking, payments);

      const bookingStatus = String(booking.status || "Pending");
      const paymentStatus = String(payment?.status || "NO PAYMENT");

      const statusClass =
        bookingStatus.toLowerCase() === "confirmed"
          ? "status-confirmed"
          : "status-pending";

      const passengers = booking.passengers?.length || 0;
      const bookingId = booking.id || booking.bookingId || "N/A";
    const rawPrice = booking.ticketPrice || payment?.amount || 0;
const price = Number(rawPrice) / 100;

      container.innerHTML += `
        <div class="user-booking-card">

          <div class="booking-logo-box">
            <img src="../img/cph.png" alt="Flight logo">
          </div>

          <div class="booking-info-box">

            <span class="booking-status ${statusClass}">
              ${bookingStatus}
            </span>

            <h3>Flight ${booking.flightId}</h3>

            <p><strong>Booking ID:</strong> ${bookingId}</p>
            <p><strong>Passengers:</strong> ${passengers}</p>
            <p><strong>Email:</strong> ${booking.contactEmail || "N/A"}</p>
            <p><strong>Phone:</strong> ${booking.contactPhone || "N/A"}</p>
            <p><strong>Payment:</strong> ${paymentStatus}</p>

          </div>

          <div class="booking-action-box">

            <div class="booking-price">
              ${price.toLocaleString("da-DK", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
})} DKK
            </div>

            <button class="booking-btn" onclick="viewBooking('${bookingId}')">
              View Booking
            </button>

          </div>

        </div>
      `;
    });
  }

function viewBooking(id) {
  const booking = allBookings.find(b =>
    String(b.id || b.bookingId) === String(id)
  );

  if (!booking) {
    return;
  }

  const payment = getPaymentForBooking(booking, allPayments);

  const passengers = booking.passengers?.length || 0;
  const paymentStatus = payment?.status || "NO PAYMENT";
const rawPrice = booking.ticketPrice || payment?.amount || 0;
const price = Number(rawPrice) / 100;

  document.getElementById("bookingModalBody").innerHTML = `
    <p><strong>Booking ID:</strong> ${booking.id || booking.bookingId || "N/A"}</p>
    <p><strong>Flight ID:</strong> ${booking.flightId || "N/A"}</p>
    <p><strong>Status:</strong> ${booking.status || "Pending"}</p>
    <p><strong>Passengers:</strong> ${passengers}</p>
    <p><strong>Email:</strong> ${booking.contactEmail || "N/A"}</p>
    <p><strong>Phone:</strong> ${booking.contactPhone || "N/A"}</p>
    <p><strong>Payment:</strong> ${paymentStatus}</p>
    <p><strong>Price:</strong> ${price.toLocaleString("da-DK", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
})} DKK</p>
  `;

  $("#bookingModal").modal("show");
}

  function logout() {
    const idToken = localStorage.getItem("id_token");

    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");
    localStorage.removeItem("id_token");
    localStorage.removeItem("user_info");

    const redirectUri = "http://localhost:5500/index.html";

    const logoutUrl =
      `${keycloakBase}/realms/${realm}/protocol/openid-connect/logout?` +
      new URLSearchParams({
        id_token_hint: idToken,
        post_logout_redirect_uri: redirectUri
      }).toString();

    window.location.href = logoutUrl;
  }

  const user = getUserInfo();

  if (user) {
    renderUserInfo(user);
    loadDashboardData();
  }

  document.getElementById("logoutBtn").addEventListener("click", logout);
  document.querySelector(".tm-current-year").innerText = new Date().getFullYear();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/templatemo-style.css">

    <style>
        .checkout-wrapper {
            max-width: 1000px;
            margin: 80px auto;
            background: white;
            box-shadow: 0 0 3px rgba(0,0,0,0.15);
            padding: 40px;
        }

        .checkout-title {
            color: #69c6ba;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .checkout-box {
            background: #f5f6f6;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .checkout-box h3 {
            color: #69c6ba;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .checkout-meta i {
            width: 20px;
            color: #c66995;
        }

        .payment-box {
            background: #69c6ba;
            color: white;
            padding: 30px;
        }

        .payment-box h2 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .btn-pay {
            background: #c66995;
            color: white;
            border: none;
            padding: 14px 35px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-pay:hover {
            background: #a94f7a;
            color: white;
        }

        .price-line {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding: 10px 0;
        }

        .price-total {
            font-size: 1.4rem;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="tm-page-wrap mx-auto">

    <div class="tm-top-bar">
        <div class="container">
            <nav class="navbar navbar-expand-lg narbar-light">
                <a class="navbar-brand mr-auto" href="../index.html">
                    <img src="../img/logo.png" alt="Site logo">
                    Flight Booking
                </a>
            </nav>
        </div>
    </div>

    <div class="tm-top-bar-bg"></div>

    <main class="checkout-wrapper" id="checkoutDetails">
        <!-- Checkout details injected here -->
    </main>

    <footer class="tm-container-outer">
        <p class="mb-0">
            Copyright © <span class="tm-current-year"></span> Flight Booking
        </p>
    </footer>

</div>

<script src="../js/checkout.js"></script>

</body>
</html>

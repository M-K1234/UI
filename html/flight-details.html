<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight Details</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/templatemo-style.css">

    <style>
        .flight-details-wrapper {
            max-width: 1000px;
            margin: 80px auto;
            background: white;
            box-shadow: 0 0 3px rgba(0,0,0,0.15);
            padding: 40px;
        }

        .flight-route-title {
            color: #69c6ba;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .flight-info-box {
            background: #f5f6f6;
            padding: 25px;
            margin-bottom: 25px;
        }

        .flight-airport-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border: 1px solid #ddd;
            background: white;
            padding: 10px;
        }

        .booking-box {
            background: #69c6ba;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .btn-book-flight {
            background: #c66995;
            color: white;
            border: none;
            padding: 14px 35px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-book-flight:hover {
            background: #a94f7a;
            color: white;
        }
        .flight-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.flight-badge {
    background: #69c6ba;
    color: white;
    padding: 6px 12px;
    font-size: 0.75rem;
    text-transform: uppercase;
    font-weight: 700;
}

.flight-info-box {
    border-radius: 4px;
}

.flight-info-box h3 {
    color: #69c6ba;
    font-weight: 700;
    margin-bottom: 15px;
}

.flight-meta {
    margin-top: 10px;
}

.flight-meta i {
    width: 20px;
    color: #c66995;
}

.booking-box h2 {
    font-size: 2.2rem;
    font-weight: 700;
}

.booking-box p {
    margin-bottom: 15px;
}
    </style>
</head>

<body>

<div class="tm-page-wrap mx-auto">

    <div class="tm-top-bar">
        <div class="container">
            <nav class="navbar navbar-expand-lg narbar-light">
                <a class="navbar-brand mr-auto" href="../index.html">
                    <img src="../img/logo.png" alt="Site logo">
                    Flight Booking
                </a>
            </nav>
        </div>
    </div>

    <div class="tm-top-bar-bg"></div>

    <main class="flight-details-wrapper" id="flightDetails">
    <!-- Flight details injected here -->
</main>

    <footer class="tm-container-outer">
        <p class="mb-0">
            Copyright © <span class="tm-current-year"></span> Flight Booking
        </p>
    </footer>

</div>

<script src="../js/flight-details.js"></script>

</body>
</html>
